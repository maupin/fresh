<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fresh — web UI (real render pipeline)</title>
<!--
  Non-terminal UI for Fresh. The REAL editor render pipeline decides what to draw;
  this frontend only re-targets the final drawing:
    - buffer interiors  -> the real syntax-highlighted CELLS the pipeline drew in
                           each pane's content_rect (drawn here as SVG text).
    - chrome            -> NATIVE UI elements built from the *semantic* model the
                           pipeline already computed (menu tree, tabs, status
                           segments). No chrome is drawn from cells.
  The editor stays the single source of truth: every chrome interaction is
  forwarded back through the real Editor::handle_mouse at the cell coordinates
  the pipeline reported, so highlight / selection / open / close all match the
  TUI and GUI exactly.
  Served by the bridge that hosts a real Editor:
    cargo run -p fresh-editor --example webui_server -- 127.0.0.1:8139 <files…>
-->
<style>
  :root{--bg:#1e1e1e;--bg2:#252526;--bg3:#333;--fg:#d4d4d4;--muted:#9aa0a6;
    --accent:#0a84ff;--border:#3a3a3a;--menuhi:#0a64c8}
  *{box-sizing:border-box}
  :focus{outline:none}
  html,body{height:100%;margin:0}
  body{height:100vh;background:var(--bg);color:var(--fg);overflow:hidden;
    font:13px/1.4 -apple-system,Segoe UI,Roboto,system-ui,sans-serif;-webkit-font-smoothing:antialiased;user-select:none}
  #app{position:relative;width:100vw;height:100vh}
  .region{position:absolute;overflow:hidden}

  /* ---- menu bar (native) ---- */
  .menubar{display:flex;align-items:center;gap:0;background:var(--bg3);
    border-bottom:1px solid var(--border);padding:0 4px}
  .menu{padding:0 10px;height:100%;display:flex;align-items:center;border-radius:0;color:var(--fg);cursor:default}
  .menu:hover{background:#454545}
  .menu.open{background:var(--menuhi);color:#fff}

  /* ---- menu dropdown (native, positioned at the pipeline's item rects) ---- */
  /* decorative backing panel sits BEHIND the rows and never eats clicks */
  .dropdown{position:absolute;z-index:70;pointer-events:none;background:#2b2b2b;
    border-radius:6px;box-shadow:0 12px 40px rgba(0,0,0,.5)}
  .mitem,.msep,.mlabel{position:absolute;z-index:81}
  .mitem{display:flex;align-items:center;gap:18px;padding:0 14px;white-space:nowrap;cursor:default;color:var(--fg)}
  .mitem.hi{background:var(--menuhi);color:#fff}
  .mitem.disabled{color:#6a6a6a}
  .mitem .lab{flex:1;display:flex;align-items:center;gap:6px}
  .mitem .accel{color:var(--muted);font-size:11px}
  .mitem.hi .accel{color:#dfe8ff}
  .mitem .arrow{color:var(--muted)}
  .mitem .check{width:12px;display:inline-block;text-align:center}
  .msep{height:1px;background:#4a4a4a;margin:4px 8px}
  .mlabel{padding:0 14px;color:var(--muted);font-style:italic}

  /* ---- tabs (native) ---- */
  .tabbar{display:flex;align-items:stretch;background:var(--bg2);border-bottom:1px solid var(--border);overflow:hidden}
  .tab{display:flex;align-items:center;gap:6px;padding:0 10px;border-right:1px solid var(--border);
    color:var(--muted);background:var(--bg2);max-width:220px;cursor:default}
  .tab.active{color:var(--fg);background:var(--bg)}
  .tab .name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .tab .dot{width:8px;height:8px;border-radius:50%;background:var(--fg);flex:0 0 auto;visibility:hidden}
  .tab.modified .dot{visibility:visible}
  .tab .x{width:16px;height:16px;border-radius:4px;text-align:center;line-height:15px;color:var(--muted);flex:0 0 auto}
  .tab .x:hover{background:#5a5a5a;color:#fff}

  /* ---- status bar (native) ---- */
  .statusbar{display:flex;align-items:center;background:var(--accent);color:#fff;
    padding:0 10px;font-size:12px;gap:0;white-space:pre}
  .statusbar .txt{padding:0 6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:60vw}
  .statusbar .seg{padding:0 8px;border-radius:3px;cursor:default}
  .statusbar .seg:hover{background:rgba(255,255,255,.18)}

  /* ---- command palette / picker (native) ---- */
  .palette{position:absolute;z-index:90;display:flex;flex-direction:column;
    background:#2b2b2b;border-radius:8px;box-shadow:0 18px 60px rgba(0,0,0,.6);overflow:hidden}
  .palette .pinput{display:flex;align-items:center;gap:8px;padding:7px 12px;border-bottom:1px solid #3a3a3a;background:#1f1f1f}
  .palette .pinput .q{flex:1;color:var(--fg);white-space:pre;overflow:hidden;text-overflow:ellipsis}
  .palette .pinput .q .caret2{display:inline-block;width:1px;background:#aeafad;animation:blink 1.05s steps(1) infinite}
  .palette .pinput .status{color:var(--muted);font-size:11px}
  .palette .pinput .count{color:var(--muted);font-size:11px}
  .palette .plist{overflow-y:auto;max-height:50vh;padding:4px 0}
  .palette .prow{display:flex;align-items:center;gap:10px;padding:3px 12px;cursor:default;color:var(--fg)}
  .palette .prow.sel{background:var(--menuhi);color:#fff}
  .palette .prow.disabled{color:#6a6a6a}
  .palette .prow .ptext{flex:0 0 auto}
  .palette .prow .pdesc{flex:1;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .palette .prow.sel .pdesc{color:#dfe8ff}
  .palette .prow .pkey{color:var(--muted);font-size:11px;border:1px solid #555;border-radius:3px;padding:0 5px}
  .palette .prow.sel .pkey{color:#fff;border-color:#9bbcf0}
  .palette .ptitle{padding:6px 12px;color:var(--muted);font-size:11px;border-bottom:1px solid #3a3a3a}
  .fileexplorer{background:var(--bg2);border-right:1px solid var(--border)}
  .pane-content{background:var(--bg)}
  .separator{background:var(--border)}
  .separator:hover{background:var(--accent)}
  .scrollbar{background:transparent}
  .thumb{position:absolute;right:1px;width:8px;border-radius:4px;background:#5a5a5a}
  .thumb:hover{background:#7a7a7a}
  .caret{position:absolute;background:#aeafad;width:2px;z-index:40;animation:blink 1.05s steps(1) infinite}
  @keyframes blink{50%{opacity:0}}
  .overlay{position:absolute;z-index:60;background:var(--bg2);border:1px solid #555;
    border-radius:8px;box-shadow:0 16px 50px rgba(0,0,0,.55);overflow:hidden}
  svg.cells{display:block;width:100%;height:100%;
    font-family:ui-monospace,SFMono-Regular,JetBrains Mono,Menlo,Consolas,monospace}
  #err{position:fixed;left:0;bottom:0;right:0;background:#5a1d1d;color:#fff;padding:6px 12px;display:none;z-index:99}
</style>
</head>
<body>
<div id="app"></div>
<div id="err"></div>

<script>
"use strict";
// --------------------------------------------------------------------------
// Real-render client. NO local model and NO re-implemented layout: the server
// runs the real Editor::render and reports the cell grid for buffer interiors
// plus the *semantic* chrome model (menu tree, tabs, status segments) the
// pipeline already computed. Buffer interiors are drawn as cells; chrome is
// drawn as native HTML. Every chrome interaction is sent back to the real
// Editor::handle_mouse at the cell coords the pipeline reported.
// --------------------------------------------------------------------------
let scene = null;
const CW = 8.2, CH = 18;        // cell pixel size (terminal cells -> pixels)

const esc = s => String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const px = (cells, sz) => (cells*sz);
function place(el, r){ el.style.left=px(r.x,CW)+"px"; el.style.top=px(r.y,CH)+"px"; el.style.width=px(r.w,CW)+"px"; el.style.height=px(r.h,CH)+"px"; }
function div(cls){ const d=document.createElement("div"); d.className=cls; return d; }
// cell coordinate to forward to the editor for a click on a chrome rect
const rectCell = r => ({ col: r.x + Math.floor(r.w/2), row: r.y });

// Draw a block of cells (rows of styled runs) as SVG <text>/<tspan>.
function cellsSvg(cells, wCells){
  let s=`<svg class="cells" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${px(wCells,CW)} ${px(cells.length,CH)}" preserveAspectRatio="xMinYMin slice" font-size="13">`;
  for(let row=0; row<cells.length; row++){
    const y=(row+1)*CH - 5;
    let col=0;
    for(const r of cells[row]){
      const ebg=r.r?(r.fg||"#d4d4d4"):r.bg;
      if(ebg){ s+=`<rect x="${(px(col,CW)).toFixed(1)}" y="${(row*CH).toFixed(1)}" width="${(px(r.t.length,CW)).toFixed(1)}" height="${CH}" fill="${ebg}"/>`; }
      col+=r.t.length;
    }
    s+=`<text y="${y.toFixed(1)}" xml:space="preserve">`;
    col=0;
    for(const r of cells[row]){
      const x=px(col,CW);
      const fill=r.r?(r.bg||"#1e1e1e"):(r.fg||"#d4d4d4");
      const weight=r.b?` font-weight="bold"`:"";
      const style=r.i?` font-style="italic"`:"";
      const deco=r.u?` text-decoration="underline"`:"";
      s+=`<tspan x="${x.toFixed(1)}" fill="${fill}"${weight}${style}${deco}>${esc(r.t)}</tspan>`;
      col+=r.t.length;
    }
    s+=`</text>`;
  }
  s+=`</svg>`;
  return s;
}

function render(){
  const app=document.getElementById("app");
  if(!scene){ app.textContent="connecting to editor…"; return; }
  app.innerHTML="";
  const reg=scene.regions;

  // file explorer (UI pane; content = its real cells)
  if(reg.fileExplorer){ const d=div("region fileexplorer"); place(d,reg.fileExplorer.rect); d.innerHTML=cellsSvg(reg.fileExplorer.cells, reg.fileExplorer.rect.w); app.appendChild(d); }

  // panes: native tab bar + buffer interior (real cells) + scrollbar (UI)
  for(const p of reg.panes){
    if(p.tabBar) app.appendChild(tabBarEl(p));
    const c=div("region pane-content"); place(c,p.content); c.innerHTML=cellsSvg(p.cells, p.content.w); app.appendChild(c);
    if(p.vscroll && p.vscroll.w>0){
      const sb=div("region scrollbar"); place(sb,p.vscroll); app.appendChild(sb);
      const th=document.createElement("div"); th.className="thumb";
      th.style.top=px(p.thumbStart,CH)+"px"; th.style.height=Math.max(CH, px(Math.max(1,p.thumbEnd-p.thumbStart),CH))+"px";
      sb.appendChild(th);
    }
  }

  // split borders
  for(const s of reg.separators){
    const d=div("region separator");
    if(s.vertical) place(d,{x:s.x,y:s.y,w:1,h:s.len}); else place(d,{x:s.x,y:s.y,w:s.len,h:1});
    app.appendChild(d);
  }

  // native menu bar + dropdown
  if(reg.menubar) app.appendChild(menuBarEl(reg));
  for(const d of menuDropdownEls(reg)) app.appendChild(d);

  // native status bar
  if(reg.statusbar) app.appendChild(statusBarEl(reg.statusbar));

  // misc popups/dialogs still drawn from real cells
  for(const o of (reg.overlays||[])){
    const d=div("overlay"); place(d,o.rect); d.innerHTML=cellsSvg(o.cells, o.rect.w); app.appendChild(d);
  }

  // native command palette / picker (semantic; routes back to the real editor)
  if(reg.palette) app.appendChild(paletteEl(reg.palette));

  // live caret from the pipeline's real cursor cell (if inside a pane)
  if(reg.cursor){
    const inPane=reg.panes.some(p=>reg.cursor.x>=p.content.x && reg.cursor.x<p.content.x+p.content.w && reg.cursor.y>=p.content.y && reg.cursor.y<p.content.y+p.content.h);
    if(inPane){ const c=div("caret"); c.style.left=px(reg.cursor.x,CW)+"px"; c.style.top=px(reg.cursor.y,CH)+"px"; c.style.height=CH+"px"; app.appendChild(c); }
  }
}

// ---- native menu bar ----------------------------------------------------
function menuBarEl(reg){
  const rect=reg.menubar;            // menubar region IS the rect {x,y,w,h}
  const bar=div("region menubar"); place(bar,{x:rect.x,y:rect.y,w:rect.w,h:1});
  const barRow=rect.y;
  reg.menus.forEach((m,i)=>{
    const el=div("menu"+(reg.menuOpen===i?" open":""));
    el.textContent=m.label;
    // forward to the real editor at the menu label's center cell -> it opens/toggles.
    const col=(m.x??rect.x)+Math.floor((m.w||1)/2);
    el.onmousedown=e=>{ e.preventDefault(); e.stopPropagation(); sendMouse({kind:"down",button:"left",col,row:barRow}); };
    // Hover switches menus only while one is open (mirrors the TUI). Uses the
    // menu's editor cell, and `mousemove` so a stationary cursor never fights
    // keyboard navigation.
    el.onmousemove=()=>{ if(reg.menuOpen!=null) hoverMove(col,barRow,"menu:"+i); };
    bar.appendChild(el);
  });
  return bar;
}

// Walk submenuPath to the items list shown at a given submenu depth (>=1).
function submenuItems(reg, depth){
  let items=reg.menus[reg.menuOpen]?.items||[];
  for(let d=0; d<depth; d++){
    const it=items[reg.submenuPath[d]];
    if(!it||it.kind!=="submenu") return [];
    items=it.items||[];
  }
  return items;
}

// One native dropdown row, positioned at the pipeline's cell rect.
// `hi` says whether the editor currently highlights this row.
function itemRow(item, rect, hi){
  if(!item) return null;
  if(item.kind==="sep"){ const s=div("msep"); place(s,rect); s.style.height="1px"; s.style.top=px(rect.y+0.5,CH)+"px"; return s; }
  if(item.kind==="label"){ const l=div("mlabel"); place(l,rect); l.style.lineHeight=CH+"px"; l.textContent=item.label; return l; }
  const cell=rectCell(rect);
  const row=div("mitem"+(hi?" hi":"")+(item.enabled===false?" disabled":""));
  place(row,rect); row.style.lineHeight=CH+"px";
  const check = item.checked===true?"✓":"";
  const arrow = item.kind==="submenu"?'<span class="arrow">›</span>':"";
  const accel = item.accel?`<span class="accel">${esc(item.accel)}</span>`:"";
  row.innerHTML=`<span class="lab"><span class="check">${check}</span>${esc(item.label)}</span>${accel}${arrow}`;
  // hover highlights via `mousemove` (never fires on a DOM rebuild under a
  // stationary cursor), so arrow-key navigation isn't reset by the mouse.
  row.onmousemove=()=>hoverMove(cell.col,cell.row,"item:"+cell.col+","+cell.row);
  row.onmousedown=e=>{ e.preventDefault(); e.stopPropagation();
    if(item.enabled===false) return;
    sendMouse({kind:"down",button:"left",col:cell.col,row:cell.row}); };
  return row;
}

function menuDropdownEls(reg){
  const out=[];
  if(reg.menuOpen==null || !reg.dropdown) return out;
  for(const grp of dropdownPanels(reg)) out.push(grp);      // solid backing panels
  const path=reg.submenuPath||[];
  // top-level items: highlighted = menuHighlight when no submenu is deeper,
  // otherwise the parent of the open submenu (path[0]).
  const items=reg.menus[reg.menuOpen]?.items||[];
  for(const di of reg.dropdown.items){
    const hi = path.length===0 ? di.index===reg.menuHighlight : di.index===path[0];
    const el=itemRow(items[di.index], di.rect, hi); if(el) out.push(el);
  }
  // expanded submenu levels
  for(const su of (reg.dropdown.submenus||[])){
    const list=submenuItems(reg, su.depth);
    const deepest = su.depth===path.length;
    const hi = deepest ? su.index===reg.menuHighlight : su.index===path[su.depth];
    const el=itemRow(list[su.index], su.rect, hi); if(el) out.push(el);
  }
  return out;
}

// Solid rounded panels behind the top-level dropdown and each submenu level,
// sized from the union of that level's item rects, EXPANDED by one cell on each
// side. The pipeline still paints the menu (with its box-drawing border) into
// the cell buffer behind us; the one-cell margin makes the opaque panel cover
// that border so it doesn't peek out as a coloured frame.
function dropdownPanels(reg){
  const panels=[];
  const box=(rects)=>{
    if(!rects.length) return null;
    const x0=Math.min(...rects.map(r=>r.x))-1, y0=Math.min(...rects.map(r=>r.y))-1;
    const x1=Math.max(...rects.map(r=>r.x+r.w))+1, y1=Math.max(...rects.map(r=>r.y+r.h))+1;
    const p=div("dropdown"); place(p,{x:x0,y:y0,w:x1-x0,h:y1-y0}); return p;
  };
  const top=box(reg.dropdown.items.map(i=>i.rect)); if(top) panels.push(top);
  const byDepth={};
  for(const su of (reg.dropdown.submenus||[])) (byDepth[su.depth]=byDepth[su.depth]||[]).push(su.rect);
  for(const d of Object.keys(byDepth)){ const p=box(byDepth[d]); if(p) panels.push(p); }
  return panels;
}

// ---- native tab bar -----------------------------------------------------
function tabBarEl(p){
  const bar=div("region tabbar"); place(bar,p.tabBar);
  for(const t of p.tabs){
    const el=div("tab"+(t.active?" active":"")+(t.modified?" modified":""));
    if(t.rect){ const c=rectCell(t.rect);
      el.onmousedown=e=>{ if(e.target.classList.contains("x")) return; e.preventDefault(); e.stopPropagation(); sendMouse({kind:"down",button:"left",col:c.col,row:c.row}); }; }
    const name=document.createElement("span"); name.className="name"; name.textContent=t.label; el.appendChild(name);
    const dot=document.createElement("span"); dot.className="dot"; el.appendChild(dot);
    const x=document.createElement("span"); x.className="x"; x.textContent="×";
    if(t.closeRect){ const cc=rectCell(t.closeRect);
      x.onmousedown=e=>{ e.preventDefault(); e.stopPropagation(); sendMouse({kind:"down",button:"left",col:cc.col,row:cc.row}); }; }
    el.appendChild(x);
    bar.appendChild(el);
  }
  return bar;
}

// ---- native command palette / picker ------------------------------------
// The editor owns the query, the filtered suggestions, the selection and the
// scroll window; we render them natively and forward row clicks / wheel back
// through handle_mouse at the pipeline's list cell rect so it stays in sync.
function paletteEl(p){
  const list = p.listRect || p.outerRect;
  // Cover the full popup outer rect (incl. the pipeline's box-drawing border,
  // which is still painted into the cells behind) with the opaque card.
  const outer = p.outerRect || list;
  const el=div("palette");
  // Position the card on the outer rect, with the input bar stacked above it so
  // it reads as one VSCode-style palette. (Clicks use the list cell rect below.)
  const inputH=34, w=outer?Math.max(360,px(outer.w,CW)):420;
  const left = outer?px(outer.x,CW):(window.innerWidth-w)/2;
  const top  = outer?Math.max(4, px(outer.y,CH)-inputH):80;
  el.style.left=left+"px"; el.style.top=top+"px"; el.style.width=w+"px";
  if(outer) el.style.minHeight=(px(outer.y+outer.h,CH)-top)+"px"; // cover the border row at the bottom

  if(p.title){ const t=div("ptitle"); t.textContent=p.title; el.appendChild(t); }
  // input bar (query + status + count)
  const bar=div("pinput");
  const q=document.createElement("span"); q.className="q";
  q.innerHTML=esc(p.query||"")+'<span class="caret2">&nbsp;</span>';
  bar.appendChild(q);
  if(p.status){ const st=document.createElement("span"); st.className="status"; st.textContent=p.status; bar.appendChild(st); }
  const cnt=document.createElement("span"); cnt.className="count";
  cnt.textContent=(p.total!=null)?((p.selected!=null?p.selected+1:0)+" / "+p.total):"";
  bar.appendChild(cnt);
  el.appendChild(bar);

  // results list — render the editor's visible window so rows map 1:1 to cells
  const listBox=div("plist");
  const start=p.scrollStart||0, n=p.visibleCount||p.suggestions.length;
  for(let j=0;j<n;j++){
    const idx=start+j; const s=p.suggestions[idx]; if(!s) break;
    const row=div("prow"+(idx===p.selected?" sel":"")+(s.disabled?" disabled":""));
    const tx=document.createElement("span"); tx.className="ptext"; tx.textContent=s.text; row.appendChild(tx);
    const ds=document.createElement("span"); ds.className="pdesc"; ds.textContent=s.description||""; row.appendChild(ds);
    if(s.keybinding){ const k=document.createElement("span"); k.className="pkey"; k.textContent=s.keybinding; row.appendChild(k); }
    if(list){ const cell={col:list.x+1,row:list.y+j};
      row.onmousedown=e=>{ if(s.disabled) return; e.preventDefault(); e.stopPropagation(); sendMouse({kind:"down",button:"left",col:cell.col,row:cell.row}); }; }
    listBox.appendChild(row);
  }
  // wheel over the list scrolls the editor's suggestion window
  if(list){ listBox.addEventListener("wheel",e=>{ e.stopPropagation();
    sendMouse({kind:e.deltaY>0?"scrolldown":"scrollup",col:list.x+1,row:list.y,n:Math.min(5,Math.max(1,Math.round(Math.abs(e.deltaY)/40)))}); },{passive:true}); }
  el.appendChild(listBox);
  return el;
}

// ---- native status bar --------------------------------------------------
function statusBarEl(sb){
  const bar=div("region statusbar"); place(bar,sb.rect);
  const segEl=seg=>{
    const s=document.createElement("span"); s.className=(seg.name==="text"?"txt":"seg"); s.dataset.name=seg.name; s.textContent=seg.text;
    const c=rectCell({x:seg.x,y:sb.rect.y,w:seg.w,h:1});
    s.onmousedown=e=>{ e.preventDefault(); e.stopPropagation(); sendMouse({kind:"down",button:"left",col:c.col,row:c.row}); };
    return s;
  };
  const segs=sb.segments.filter(s=>s.text);
  for(const seg of segs.filter(s=>s.side!=="right")) bar.appendChild(segEl(seg));
  const spacer=document.createElement("span"); spacer.style.flex="1"; bar.appendChild(spacer);
  for(const seg of segs.filter(s=>s.side==="right")) bar.appendChild(segEl(seg));
  return bar;
}

// --- bridge to the real editor ---
async function refresh(){ try{ scene=await (await fetch("/state")).json(); render(); }catch(e){ showErr("load failed: "+e); } }
async function sendKey(d){ try{ scene=await (await fetch("/key",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify(d)})).json(); render(); }catch(e){ showErr("key failed: "+e); } }
async function resize(){ const cols=Math.max(20,Math.floor(window.innerWidth/CW)), rows=Math.max(8,Math.floor(window.innerHeight/CH));
  try{ scene=await (await fetch("/resize",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({cols,rows})})).json(); render(); }catch(e){} }
function showErr(m){ const e=document.getElementById("err"); e.textContent=m; e.style.display="block"; }

const NAMED=new Set(["Enter","Backspace","Delete","Tab","Escape","ArrowUp","ArrowDown","ArrowLeft","ArrowRight","Home","End","PageUp","PageDown"]);
document.addEventListener("keydown",e=>{
  // forward single characters (with or without modifiers, so Ctrl+P / Ctrl+S
  // shortcuts reach the editor) and the named navigation/edit keys.
  const single=e.key.length===1;
  if(single||NAMED.has(e.key)){ e.preventDefault(); sendKey({key:e.key,ctrl:e.ctrlKey,meta:e.metaKey,shift:e.shiftKey,alt:e.altKey}); }
});
// Mouse + wheel: forward to the REAL Editor::handle_mouse at cell coordinates.
const cellAt = e => ({ col: Math.max(0, Math.floor(e.clientX/CW)), row: Math.max(0, Math.floor(e.clientY/CH)) });
const btn = e => (e.button===2?"right":e.button===1?"middle":"left");
async function sendMouse(o){ try{ scene=await (await fetch("/mouse",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify(o)})).json(); render(); }catch(err){ showErr("mouse failed: "+err); } }
// Forward a hover as a `moved` event at a chrome element's *editor cell* (not the
// pixel under the pointer — native chrome is laid out by CSS, so pixels don't map
// to the editor's cell columns). Called from `onmousemove` (which, unlike
// `mouseenter`, never fires on a DOM rebuild under a stationary cursor), and
// de-duped so keyboard navigation isn't fought and we don't spam the editor.
let lastHoverKey=null;
function hoverMove(col,row,key){ if(key===lastHoverKey) return; lastHoverKey=key; sendMouse({kind:"moved",col,row}); }
let dragging=false, lastCell=null;
// Chrome (menu bar, dropdown, tabs, status bar) owns its own mouse events and
// forwards them to the editor at the exact cell rects the pipeline reported.
// The document-level handlers are the fallback for buffer interiors, scrollbars
// and separators, so they ignore anything that lands on a chrome element.
const onChrome = e => e.target.closest(".menubar,.dropdown,.tabbar,.statusbar,.palette");
document.addEventListener("mousedown",e=>{ if(onChrome(e)) return; const c=cellAt(e); dragging=true; lastCell=c; sendMouse({kind:"down",button:btn(e),col:c.col,row:c.row,ctrl:e.ctrlKey,shift:e.shiftKey,alt:e.altKey}); });
document.addEventListener("mousemove",e=>{ if(!dragging) return; const c=cellAt(e); if(lastCell&&c.col===lastCell.col&&c.row===lastCell.row) return; lastCell=c; sendMouse({kind:"drag",button:"left",col:c.col,row:c.row,ctrl:e.ctrlKey,shift:e.shiftKey,alt:e.altKey}); });
document.addEventListener("mouseup",e=>{ dragging=false; if(onChrome(e)) return; const c=cellAt(e); sendMouse({kind:"up",button:btn(e),col:c.col,row:c.row}); });
document.addEventListener("contextmenu",e=>e.preventDefault());
document.addEventListener("wheel",e=>{ const c=cellAt(e); const n=Math.min(8,Math.max(1,Math.round(Math.abs(e.deltaY)/40))); sendMouse({kind:e.deltaY>0?"scrolldown":"scrollup",col:c.col,row:c.row,n}); },{passive:true});

let rt; window.addEventListener("resize",()=>{ clearTimeout(rt); rt=setTimeout(resize,150); });

window.fresh = { get scene(){return scene;}, refresh, sendKey, resize };
resize(); // sets size to the window, then renders
</script>
</body>
</html>
